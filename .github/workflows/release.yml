# 自动构建发布包并上传到 GitHub Release（以 2.0.3 / 标签 v2.0.3 为例）
# 1. 确认根目录 package.json 的 version 与即将打的标签一致（如 2.0.3 对应标签 v2.0.3）。
# 2. git tag v2.0.3 && git push origin v2.0.3
#    将触发：构建 → 校验版本 → 打 GitHub Release 并上传 tgz。
# 3. 本 workflow 不再发布到 npmjs 或 GitHub Packages。

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Match package.json version to git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -e
          REF_NAME="${GITHUB_REF_NAME#refs/tags/}"
          REF_NAME="${REF_NAME#v}"
          PKG_VER="$(node -p "require('./package.json').version")"
          if [ "$REF_NAME" != "$PKG_VER" ]; then
            echo "::error::package.json version is $PKG_VER but tag resolves to $REF_NAME (expected v$PKG_VER)"
            exit 1
          fi

      - name: CI checks
        run: npm run typecheck && npm run lint && npm run format:check && npm test

      - name: Build package
        run: npm run release:pack

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: secbot-npm-package
          path: '*.tgz'

  upload-assets:
    name: GitHub Release assets
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download built package
        uses: actions/download-artifact@v4
        with:
          name: secbot-npm-package
          path: artifacts

      - name: Create or update release and upload .tgz
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tgz
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
