# 多平台构建 Hackbot 可执行程序并发布到 GitHub Release
# 触发: 推送 tag 如 v1.0.0，或手动 workflow_dispatch

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            name: windows-amd64
          - runner: macos-14
            name: darwin-arm64
          - runner: macos-14
            name: darwin-amd64

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: matrix.name != 'darwin-amd64'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python 3.11 x86_64 (Intel Mac build)
        if: matrix.name == 'darwin-amd64'
        run: |
          curl -sL "https://www.python.org/ftp/python/3.11.9/python-3.11.9-macos11.pkg" -o python.pkg
          sudo installer -pkg python.pkg -target /
          echo "/Library/Frameworks/Python.framework/Versions/3.11/bin" >> $GITHUB_PATH
          echo "PATH=/Library/Frameworks/Python.framework/Versions/3.11/bin:$PATH" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          if [ "${{ matrix.name }}" = "darwin-amd64" ]; then
            PY=/Library/Frameworks/Python.framework/Versions/3.11/bin/python3
            arch -x86_64 $PY -m pip install --upgrade pip
            arch -x86_64 $PY -m pip install -r requirements.txt pyinstaller
          else
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            pip install pyinstaller
          fi

      - name: Build executable (PyInstaller onedir)
        run: |
          if [ "${{ matrix.name }}" = "darwin-amd64" ]; then
            arch -x86_64 /Library/Frameworks/Python.framework/Versions/3.11/bin/python3 -m PyInstaller hackbot.spec
          else
            pyinstaller hackbot.spec
          fi

      - name: Package artifact (zip)
        shell: bash
        run: |
          if [ "${{ matrix.name }}" = "darwin-amd64" ]; then
            python3 -c "import shutil,os; os.chdir('dist'); shutil.make_archive('hackbot-${{ matrix.name }}', 'zip', '.', 'hackbot')"
          else
            python -c "import shutil,os; os.chdir('dist'); shutil.make_archive('hackbot-${{ matrix.name }}', 'zip', '.', 'hackbot')"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hackbot-${{ matrix.name }}
          path: dist/hackbot-${{ matrix.name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version from tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=v0.0.0-dev" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Hackbot ${{ steps.tag.outputs.version }}
          body: |
            ## 安装与运行

            1. 下载对应平台的 zip（如 `hackbot-windows-amd64.zip`、`hackbot-darwin-arm64.zip`（Apple 芯片）、`hackbot-darwin-amd64.zip`（Intel Mac）），解压得到 `hackbot` 目录。
            2. 配置 **DeepSeek API Key**（启动前唯一必须条件）：
               - **环境变量**：`export DEEPSEEK_API_KEY=sk-xxx`（macOS）或 系统环境变量（Windows）
               - **或** 在 `hackbot` 目录内创建 `.env` 文件，内容：`DEEPSEEK_API_KEY=sk-xxx`
            3. 进入 `hackbot` 目录，运行 `hackbot.exe`（Windows）或 `./hackbot`（macOS），即可进入交互式安全测试界面。

            获取 API Key：https://platform.deepseek.com
          draft: false
          files: |
            artifacts/hackbot-windows-amd64/hackbot-windows-amd64.zip
            artifacts/hackbot-darwin-arm64/hackbot-darwin-arm64.zip
            artifacts/hackbot-darwin-amd64/hackbot-darwin-amd64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
