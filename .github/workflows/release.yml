# 多平台构建 Secbot 并发布到 GitHub Release
# 纯 TypeScript/Node.js 项目
# 触发: 推送 tag 如 v1.0.0，或手动 workflow_dispatch

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            name: linux-amd64
          - runner: windows-latest
            name: windows-amd64
          - runner: macos-14
            name: darwin-arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Install terminal-ui dependencies
        working-directory: terminal-ui
        run: npm ci

      - name: Build terminal-ui
        working-directory: terminal-ui
        run: npm run build

      - name: Package artifact (zip)
        shell: bash
        run: |
          mkdir -p dist/secbot
          cp -r server/dist dist/secbot/server
          cp server/package.json dist/secbot/server-package.json
          cp -r terminal-ui/dist dist/secbot/terminal-ui 2>/dev/null || true
          cp terminal-ui/package.json dist/secbot/tui-package.json
          cd dist && zip -r "secbot-${{ matrix.name }}.zip" secbot/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: secbot-${{ matrix.name }}
          path: dist/secbot-${{ matrix.name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version from tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=v0.0.0-dev" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Secbot ${{ steps.tag.outputs.version }}
          body: |
            ## Secbot — 开源自动化安全测试智能体

            ### 安装与运行

            **系统要求：** Node.js 18+

            1. 克隆仓库并安装依赖：
               ```bash
               git clone https://github.com/iammm0/secbot.git secbot
               cd secbot
               cd server && npm install && cd ..
               cd terminal-ui && npm install && cd ..
               ```
            2. 配置 LLM：
               - 默认使用 Ollama（本地运行，无需 API Key）
               - 或设置环境变量 `LLM_PROVIDER=deepseek` + `DEEPSEEK_API_KEY=sk-xxx`
            3. 启动后端：
               ```bash
               npm run dev
               ```
            4. 启动 TUI（另一个终端）：
               ```bash
               npm run tui
               ```
          draft: false
          files: |
            artifacts/secbot-linux-amd64/secbot-linux-amd64.zip
            artifacts/secbot-windows-amd64/secbot-windows-amd64.zip
            artifacts/secbot-darwin-arm64/secbot-darwin-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
