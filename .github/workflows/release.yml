# 多平台构建 Hackbot 可执行程序并发布到 GitHub Release
# 触发: 推送 tag 如 v1.0.0，或手动 workflow_dispatch

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            name: windows-amd64
          - runner: macos-14
            name: darwin-arm64

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable (PyInstaller onedir)
        run: pyinstaller hackbot.spec

      - name: Package artifact (zip)
        shell: bash
        run: |
          cd dist && zip -r hackbot-${{ matrix.name }}.zip hackbot && cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hackbot-${{ matrix.name }}
          path: dist/hackbot-${{ matrix.name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version from tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=v0.0.0-dev" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Hackbot ${{ steps.tag.outputs.version }}
          body: |
            ## 安装与运行

            1. 下载对应平台的 zip（如 `hackbot-windows-amd64.zip`、`hackbot-darwin-arm64.zip`），解压得到 `hackbot` 目录。
            2. 配置 **DeepSeek API Key**（启动前唯一必须条件）：
               - **环境变量**：`export DEEPSEEK_API_KEY=sk-xxx`（macOS）或 系统环境变量（Windows）
               - **或** 在 `hackbot` 目录内创建 `.env` 文件，内容：`DEEPSEEK_API_KEY=sk-xxx`
            3. 进入 `hackbot` 目录，运行 `hackbot.exe`（Windows）或 `./hackbot`（macOS），即可进入交互式安全测试界面。

            获取 API Key：https://platform.deepseek.com
          draft: false
          files: |
            artifacts/hackbot-windows-amd64/hackbot-windows-amd64.zip
            artifacts/hackbot-darwin-arm64/hackbot-darwin-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
