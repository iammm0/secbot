# 多平台构建 Hackbot 可执行程序并发布到 GitHub Release
# 依赖: pyproject.toml + uv（不再使用 requirements.txt）
# 触发: 推送 tag 如 v1.0.0，或手动 workflow_dispatch

name: Release

on:
  push:
    branches:
      - main
      - beta
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (tag/sha/branch). Leave empty to use current.
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.semantic.outputs.released }}
      version: ${{ steps.semantic.outputs.version }}
      tag: ${{ steps.semantic.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python Semantic Release
        id: semantic
        if: github.event_name == 'push'
        uses: python-semantic-release/python-semantic-release@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: release
    if: (github.event_name == 'push' && needs.release.outputs.released == 'true') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            name: linux-amd64
          - runner: windows-latest
            name: windows-amd64
          - runner: macos-14
            name: darwin-arm64
          - runner: macos-15-intel
            name: darwin-amd64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || needs.release.outputs.tag || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies (uv)
        shell: bash
        run: |
          uv sync --no-install-project
          uv pip install pyinstaller

      - name: Build executable (PyInstaller onedir)
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            .venv/Scripts/python.exe -m PyInstaller hackbot.spec
          else
            .venv/bin/python -m PyInstaller hackbot.spec
          fi

      - name: Create release README (in package)
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.release.outputs.tag || github.ref_name }}
          RELEASE_VERSION: ${{ needs.release.outputs.version || needs.release.outputs.tag || github.ref_name }}
          PLATFORM_NAME: ${{ matrix.name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          from datetime import datetime, timezone

          release_tag = os.environ.get("RELEASE_TAG", "").strip()
          release_version_raw = os.environ.get("RELEASE_VERSION", "").strip()
          platform_name = os.environ.get("PLATFORM_NAME", "").strip()

          version_for_changelog = release_version_raw.lstrip("v")
          changelog_path = pathlib.Path("docs/CHANGELOG.md")

          changelog_section = ""
          if changelog_path.exists() and version_for_changelog:
              text = changelog_path.read_text(encoding="utf-8")
              header_re = re.compile(rf"^## \[{re.escape(version_for_changelog)}\].*$", re.M)
              m = header_re.search(text)
              if m:
                  start = m.start()
                  next_m = re.search(r"^## \[", text[m.end():], re.M)
                  end = len(text) if not next_m else (m.end() + next_m.start())
                  changelog_section = text[start:end].strip()

          dist_dir = pathlib.Path("dist") / "hackbot"
          dist_dir.mkdir(parents=True, exist_ok=True)

          build_time = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          title_version = release_tag or release_version_raw or "dev"

          content = [
              f"# Hackbot {title_version}",
              "",
              f"Platform: {platform_name}",
              f"Build: {build_time}",
              "",
          ]
          if changelog_section:
              content.append(changelog_section)
              content.append("")

          (dist_dir / "README_RELEASE.md").write_text("\n".join(content).rstrip() + "\n", encoding="utf-8")
          readme_src = pathlib.Path("README.md")
          if readme_src.exists():
              (dist_dir / "README.md").write_text(readme_src.read_text(encoding="utf-8"), encoding="utf-8")
          PY

      - name: Package artifact (zip)
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            python -c "import shutil,os; os.chdir('dist'); shutil.make_archive('hackbot-${{ matrix.name }}', 'zip', '.', 'hackbot')"
          else
            .venv/bin/python -c "import shutil,os; os.chdir('dist'); shutil.make_archive('hackbot-${{ matrix.name }}', 'zip', '.', 'hackbot')"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: secbot-cli-${{ matrix.name }}
          path: dist/secbot-cli-${{ matrix.name }}.zip

  upload-assets:
    needs: [release, build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.release.outputs.released == 'true'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
